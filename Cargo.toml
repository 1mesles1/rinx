[package]
name = "rink"
version = "0.3.0"
edition = "2024"
license = "GPL-3.0-or-later"

[dependencies]
ratatui = "0.26"
crossterm = "0.27"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
roxmltree = "0.19"
dirs = "5.0"
zip = "0.6"      # Для работы с архивами .zip
regex = "1"      # Для работы с регулярными выражениями
textwrap = { version = "0.16.2", features = ["unicode-width"] }
encoding_rs = "0.8.35"
walkdir = "2"
